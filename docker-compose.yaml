# nginx proxy address - http://172.17.0.1:8081

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  shopware:
    image: shopware/production:latest
    container_name: shopware-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - shopware
    ports:
      - "8081:80"
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./rootfs/data/shopware:/data
      - ./rootfs/config/shopware:/config
    depends_on:
      - shopware-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  shopware-db:
    image: mariadb:11
    container_name: shopware-db
    restart: unless-stopped
    logging: *default-logging
    networks:
      - shopware
    environment:
      TZ: ${TZ:-America/New_York}
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-shopware}
      MARIADB_USER: ${DB_USER_NAME:-shopware}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_root_password}
    volumes:
      - ./rootfs/data/db/mariadb/shopware:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  shopware:
    external: false
