# nginx proxy address - http://172.17.0.1:8081

name: shopware
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  app:
    image: shopware/production:latest
    pull_policy: always
    container_name: shopware-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - shopware
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:8081:80"
    environment:
      TZ: ${TZ:-America/New_York}
      DATABASE_URL: mysql://${DB_USER_NAME:-shopware}:${DB_USER_PASS:-changeme_db_password}@shopware-db:3306/${DB_CREATE_DATABASE_NAME:-shopware}
      APP_URL: https://${BASE_HOST_NAME:-$HOSTNAME}.${BASE_DOMAIN_NAME:-example.com}
      APP_SECRET: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      MAILER_DSN: smtp://${EMAIL_SERVER_HOST:-localhost}:${EMAIL_SERVER_PORT:-25}
      CONTAINER_NAME: shopware-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    volumes:
      - ./volumes/data/shopware/files:/var/www/html/files
      - ./volumes/data/shopware/theme:/var/www/html/public/theme
      - ./volumes/data/shopware/media:/var/www/html/public/media
      - ./volumes/data/shopware/thumbnails:/var/www/html/public/thumbnail
      - ./volumes/data/shopware/sitemap:/var/www/html/public/sitemap
    depends_on:
      shopware-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://shopware-app:80'
      - 'cloudflare.hostname=shopware.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.shopware-app.entrypoints=http'
      - 'traefik.http.routers.shopware-app-secure.tls=true'
      - 'traefik.http.routers.shopware-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.shopware-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.shopware-app.middlewares=shopware-app-https-redirect'
      - 'traefik.http.routers.shopware-app-secure.entrypoints=https'
      - 'traefik.http.routers.shopware-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.shopware-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.shopware-app-secure.service=shopware-app'
      - 'traefik.http.services.shopware-app.loadbalancer.server.port=80'

  shopware-db:
    image: mariadb:latest
    pull_policy: always
    container_name: shopware-db
    hostname: shopware-db
    restart: always
    logging: *default-logging
    networks:
      - shopware
    environment:
      TZ: ${TZ:-America/New_York}
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-shopware}
      MARIADB_USER: ${DB_USER_NAME:-shopware}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
      CONTAINER_NAME: shopware-db
    volumes:
      - ./volumes/data/db/mariadb/shopware:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  shopware:
    name: shopware
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
